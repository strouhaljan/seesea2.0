version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_EVENT_SLUG=${VITE_EVENT_SLUG}
      - API_TARGET=http://server:3001

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - server-data:/app/data
    environment:
      - PORT=3001
      - HISTORY_DATA_PATH=/app/data/data.json

volumes:
  server-data: