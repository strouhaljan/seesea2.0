version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - server-data:/app/data
    environment:
      - PORT=3001
      - HISTORY_DATA_PATH=/app/data/data.json

volumes:
  server-data: